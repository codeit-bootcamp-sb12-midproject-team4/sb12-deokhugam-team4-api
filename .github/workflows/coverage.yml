name: Test Coverage

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
  workflow_dispatch:

jobs:
  test-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup jdk 17
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '17'

      - name: Caching gradle
        uses: gradle/actions/setup-gradle@v5
      #        https://github.com/gradle/actions/tree/main/setup-gradle

      - name: Grant permission
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test

          AWS_REGION: ${{ secrets.AWS_S3_REGION }}
          AWS_S3_REGION: ${{ secrets.AWS_S3_REGION }}
          AWS_S3_ACCESS_KEY: ${{ secrets.AWS_S3_ACCESS_KEY }}
          AWS_S3_SECRET_KEY: ${{ secrets.AWS_S3_SECRET_KEY }}
          AWS_S3_BUCKET_NAME_DEV: ${{ secrets.AWS_S3_BUCKET_NAME_DEV }}
          AWS_S3_PRESIGNED_URL_EXPIRATION: ${{ secrets.AWS_S3_PRESIGNED_URL_EXPIRATION }}

          ALADIN_API_CLIENT_SECRET: ${{ secrets.ALADIN_API_CLIENT_SECRET }}
          ALADIN_API_CLIENT_URI: ${{ secrets.ALADIN_API_CLIENT_URI }}
          NAVER_API_CLIENT_ID: ${{ secrets.NAVER_API_CLIENT_ID }}
          NAVER_API_CLIENT_SECRET: ${{ secrets.NAVER_API_CLIENT_SECRET }}
          NAVER_API_CLIENT_URI: ${{ secrets.NAVER_API_CLIENT_URI }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}