spring:
  config:
    activate:
      on-profile: test-es

  datasource:
    url: jdbc:h2:mem:deokhugam-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: never

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        jdbc.time_zone: UTC
    open-in-view: false
    show-sql: false

  h2:
    console:
      enabled: false

  elasticsearch:
    uris: http://localhost:9200
